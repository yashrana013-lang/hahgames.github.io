<style>
  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff0080;
    --neon-purple: #9d00ff;
    --neon-green: #00ff88;
    --bg: #050510;
    --bg2: #0a0a1a;
    --bg3: #0f0f25;
    --card-bg: #0d0d20;
    --text: #e0e0ff;
    --text-muted: #6060a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(157,0,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* NAVBAR */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5,5,16,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,245,255,0.15);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    position: relative;
  }

  .logo-glow {
    position: absolute;
    inset: 0;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: var(--neon-cyan);
    filter: blur(8px);
    opacity: 0.4;
    pointer-events: none;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .game-count {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    color: var(--neon-green);
    letter-spacing: 2px;
    border: 1px solid rgba(0,255,136,0.3);
    padding: 4px 10px;
    border-radius: 2px;
  }

  /* HERO */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 4rem 2rem 2rem;
  }

  .hero h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: 6px;
    line-height: 1.1;
    background: linear-gradient(180deg, #ffffff 0%, var(--neon-cyan) 60%, var(--neon-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1rem;
  }

  .hero p {
    color: var(--text-muted);
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    max-width: 560px;
    margin: 0 auto 1.5rem;
  }

  .search-wrap::before {
    content: '';
    position: absolute;
    inset: -1px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
    border-radius: 4px;
    z-index: -1;
    opacity: 0.6;
  }

  #search {
    width: 100%;
    background: var(--bg2);
    border: none;
    outline: none;
    padding: 14px 20px 14px 48px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color: var(--text);
    border-radius: 3px;
  }

  #search::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--neon-cyan);
    font-size: 1.1rem;
    pointer-events: none;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 2rem 2rem;
    position: relative;
    z-index: 1;
  }

  .filter-btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    padding: 6px 16px;
    background: transparent;
    border: 1px solid rgba(0,245,255,0.2);
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    background: rgba(0,245,255,0.05);
    box-shadow: 0 0 12px rgba(0,245,255,0.1);
  }

  /* STATS BAR */
  .stats-bar {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 2rem;
    border-top: 1px solid rgba(0,245,255,0.08);
    border-bottom: 1px solid rgba(0,245,255,0.08);
    margin-bottom: 2rem;
    background: rgba(10,10,26,0.5);
  }

  .stats-bar span {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .stats-bar .count {
    color: var(--neon-green);
  }

  /* GAME GRID */
  .grid-wrap {
    position: relative;
    z-index: 1;
    padding: 0 1.5rem 4rem;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* GAME CARD */
  .game-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    text-decoration: none;
    display: block;
    aspect-ratio: 4/3;
  }

  .game-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.15), 0 8px 32px rgba(0,0,0,0.4);
  }

  .game-card:hover .card-thumb {
    opacity: 0.7;
  }

  .game-card:hover .play-btn {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .game-card:hover .card-overlay {
    opacity: 1;
  }

  /* Thumb (colored placeholder) */
  .card-thumb {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    transition: opacity 0.2s;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.1), rgba(157,0,255,0.1));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    width: 40px;
    height: 40px;
    background: var(--neon-cyan);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,245,255,0.5);
  }

  .play-btn::after {
    content: '';
    border-left: 14px solid var(--bg);
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    margin-left: 3px;
  }

  .card-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 10px;
    background: linear-gradient(transparent, rgba(5,5,16,0.95));
  }

  .card-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 1px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
  }

  /* GAME IFRAME MODAL */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--bg);
    flex-direction: column;
  }

  .modal.open { display: flex; }

  .modal-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 52px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(0,245,255,0.15);
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 3px;
    color: var(--neon-cyan);
    text-transform: uppercase;
  }

  .modal-close {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    background: transparent;
    border: 1px solid rgba(255,0,128,0.4);
    color: var(--neon-pink);
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .modal-close:hover {
    background: rgba(255,0,128,0.1);
    box-shadow: 0 0 12px rgba(255,0,128,0.2);
  }

  #game-frame {
    flex: 1;
    border: none;
    width: 100%;
  }

  /* NO RESULTS */
  .no-results {
    display: none;
    text-align: center;
    padding: 4rem 2rem;
    grid-column: 1/-1;
  }

  .no-results p {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 3px;
    color: var(--text-muted);
  }

  /* Scanline effect on cards */
  .game-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .game-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    nav { padding: 0 1rem; }
    .hero { padding: 2rem 1rem 1rem; }
    .grid-wrap { padding: 0 1rem 3rem; }
  }
</style>
</head>

const resultCount = document.getElementById('result-count');
const navCount = document.getElementById('nav-count');
const modal = document.getElementById('modal');
const gameFrame = document.getElementById('game-frame');
const modalTitle = document.getElementById('modal-title');
const closeBtn = document.getElementById('close-btn');

navCount.textContent = games.length + ' GAMES';

function getEmoji(slug) {
  const map = {
    slope:'🏔️', 'flappy-bird':'🐦', '2048':'🔢', 'cookie-clicker':'🍪',
    'subway-surfers':'🏃', 'retro-bowl':'🏈', 'geometry-dash-lite':'⚡',
    'run-3':'🏃', 'smash-karts':'🏎️', 'basketball-stars':'🏀',
    'friday-night-funkin':'🎵', 'drift-boss':'🚗', motox3m:'🏍️',
    'fireboy-and-watergirl':'🔥', 'stickman-hook':'🕷️', 'tiny-fishing':'🎣',
    'doodle-jump':'🐸', 'chrome-dino':'🦕', 'tunnel-rush':'🌀',
    'cut-the-rope':'✂️', 'crossy-road':'🐔', 'mario-game':'🍄',
    'shadow-fight':'🥊', 'temple-run-2':'🏛️', 'idle-breakout':'🧱',
    hextris:'🔷', ovo:'⭕', 'rooftop-snipers':'🎯', yohoho:'⚔️',
    'monkey-mart':'🐒', 'eggy-car':'🥚', sandspiel:'⏳',
  };
  return map[slug] || '🎮';
}

function buildCards(list) {
  grid.innerHTML = '';
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results" style="display:block;grid-column:1/-1;text-align:center;padding:4rem"><p style="font-family:Orbitron,monospace;font-size:.8rem;letter-spacing:3px;color:#6060a0">NO GAMES FOUND</p></div>';
    resultCount.textContent = '0';
    return;
  }
  resultCount.textContent = list.length;
  list.forEach((game, i) => {
    const p = palettes[i % palettes.length];
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="card-thumb" style="background:${p[0]};color:${p[1]};font-size:2.2rem">${getEmoji(game.slug)}</div>
      <div class="card-overlay"></div>
      <div class="play-btn"></div>
      <div class="card-info"><div class="card-name">${game.name}</div></div>
    `;
    card.addEventListener('click', () => openGame(game));
    grid.appendChild(card);
  });
}

function openGame(game) {
  modalTitle.textContent = game.name.toUpperCase();
  gameFrame.src = '/games/' + game.slug;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

closeBtn.addEventListener('click', () => {
  modal.classList.remove('open');
  gameFrame.src = '';
  document.body.style.overflow = '';
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeBtn.click();
});

let activeFilter = 'all';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    filterGames();
  });
});

searchInput.addEventListener('input', filterGames);

function filterGames() {
  const q = searchInput.value.toLowerCase().trim();
  let list = games;
  if (activeFilter !== 'all') list = list.filter(g => g.tags.includes(activeFilter));
  if (q) list = list.filter(g => g.name.toLowerCase().includes(q) || g.slug.includes(q));
  buildCards(list);
}

buildCards(games);
</script>
</body>
</html>
